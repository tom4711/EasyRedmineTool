name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EasyRedmineTool.slnx

      - name: Build
        run: dotnet build EasyRedmineTool.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EasyRedmineTool.slnx --no-build --configuration Release --verbosity normal
