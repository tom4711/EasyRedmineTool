name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore EasyRedmineTool.slnx

      - name: Build
        run: dotnet build EasyRedmineTool.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test EasyRedmineTool.slnx --no-build --configuration Release --verbosity normal

  release-windows:
    needs: validate
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Publish Windows x64
        run: >
          dotnet publish src/EasyRedmineTool.Desktop/EasyRedmineTool.Desktop.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=false
          --output publish/win-x64

      - name: Create ZIP archive
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $archive = "EasyRedmineTool-$version-win-x64.zip"
          Compress-Archive -Path "publish/win-x64/*" -DestinationPath $archive
          echo "ARCHIVE_NAME=$archive" >> $env:GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: EasyRedmineTool-${{ github.ref_name }}-win-x64
          path: ${{ env.ARCHIVE_NAME }}
          retention-days: 90

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: EasyRedmineTool ${{ github.ref_name }}
          files: ${{ env.ARCHIVE_NAME }}
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
